<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffb2"/>
      <stop offset="100%" style="stop-color:#4d9fff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#05070d" rx="6"/>

  <!-- Wheel ring -->
  <circle cx="13" cy="20" r="9" fill="none" stroke="#111422" stroke-width="3"/>
  <circle cx="13" cy="20" r="9" fill="none" stroke="url(#g)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Spokes -->
  <g stroke="url(#g)" stroke-width="0.8" opacity="0.5">
    <line x1="13" y1="11" x2="13" y2="29"/>
    <line x1="4" y1="20" x2="22" y2="20"/>
    <line x1="7" y1="14" x2="19" y2="26"/>
    <line x1="19" y1="14" x2="7" y2="26"/>
  </g>

  <!-- Hub -->
  <circle cx="13" cy="20" r="1.8" fill="#05070d" stroke="url(#g)" stroke-width="1" filter="url(#glow)"/>

  <!-- Lightning bolt -->
  <polygon points="14,13.5 11,19 13.5,19 11,25 16,18 13,18" fill="url(#g)" filter="url(#glow)"/>

  <!-- Signal arcs top-right -->
  <g fill="none" stroke="#4d9fff" stroke-linecap="round" opacity="0.9">
    <path d="M 22 10 A 3 3 0 0 1 25 13" stroke-width="1.2"/>
    <path d="M 21 8 A 5 5 0 0 1 26 13" stroke-width="0.9" opacity="0.6"/>
  </g>
  <circle cx="23.5" cy="11.5" r="1" fill="#4d9fff"/>
</svg>
