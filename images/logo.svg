<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffb2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d9fff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffb2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc8a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#05070d" rx="24"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00ffb2" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Wheelchair seat back -->
  <rect x="152" y="118" width="8" height="80" rx="4" fill="#1c2035"/>
  <!-- Wheelchair seat -->
  <rect x="152" y="190" width="72" height="8" rx="4" fill="#1c2035"/>

  <!-- Wheelchair frame - front leg -->
  <line x1="224" y1="198" x2="236" y2="258" stroke="#1c2035" stroke-width="7" stroke-linecap="round"/>
  <!-- Wheelchair frame - back leg -->
  <line x1="160" y1="198" x2="150" y2="258" stroke="#1c2035" stroke-width="7" stroke-linecap="round"/>

  <!-- Small front wheel -->
  <circle cx="238" cy="264" r="16" fill="none" stroke="#1c2035" stroke-width="6"/>
  <circle cx="238" cy="264" r="4" fill="#1c2035"/>

  <!-- MAIN WHEEL - large, neon accent -->
  <circle cx="155" cy="268" r="62" fill="none" stroke="#111422" stroke-width="14"/>
  <circle cx="155" cy="268" r="62" fill="none" stroke="url(#wheelGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Wheel spokes -->
  <g stroke="url(#accentGrad)" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <line x1="155" y1="206" x2="155" y2="330"/>
    <line x1="93" y1="268" x2="217" y2="268"/>
    <line x1="111" y1="224" x2="199" y2="312"/>
    <line x1="199" y1="224" x2="111" y2="312"/>
  </g>

  <!-- Wheel hub -->
  <circle cx="155" cy="268" r="10" fill="#05070d" stroke="url(#accentGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Lightning bolt / assist indicator on wheel -->
  <polygon points="160,248 150,265 157,265 150,285 165,262 157,262" fill="url(#accentGrad)" filter="url(#glowStrong)"/>

  <!-- Smart signal arcs (wifi-like, top right of wheel) -->
  <g fill="none" stroke="#4d9fff" stroke-linecap="round" filter="url(#glow)" opacity="0.9">
    <path d="M 210 215 A 18 18 0 0 1 228 233" stroke-width="2.5"/>
    <path d="M 205 208 A 28 28 0 0 1 233 236" stroke-width="2"/>
    <path d="M 200 201 A 38 38 0 0 1 238 239" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Signal dot -->
  <circle cx="219" cy="224" r="3" fill="#4d9fff" filter="url(#glow)"/>

  <!-- Diagonal accent line (the brand diagonal) -->
  <line x1="270" y1="130" x2="310" y2="170" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Text: SDA monogram top-left corner -->
  <text x="32" y="60" font-family="'Courier New', monospace" font-size="11" font-weight="700"
    fill="#00ffb2" letter-spacing="3" opacity="0.7">SDA</text>

  <!-- Divider line under monogram -->
  <line x1="32" y1="66" x2="72" y2="66" stroke="#00ffb2" stroke-width="0.8" opacity="0.4"/>

  <!-- Main text: SMARTDRIVE -->
  <text x="200" y="352" font-family="'Courier New', monospace" font-size="22" font-weight="700"
    fill="#e2e8f8" letter-spacing="5" text-anchor="middle">SMARTDRIVE</text>

  <!-- Sub text: ASSIST -->
  <text x="200" y="376" font-family="'Courier New', monospace" font-size="13" font-weight="400"
    fill="url(#accentGrad)" letter-spacing="10" text-anchor="middle">ASSIST</text>

  <!-- Corner bracket top-right -->
  <polyline points="350,30 380,30 380,60" fill="none" stroke="#00ffb2" stroke-width="1.5" opacity="0.3"/>
  <!-- Corner bracket bottom-left -->
  <polyline points="50,370 20,370 20,340" fill="none" stroke="#00ffb2" stroke-width="1.5" opacity="0.3"/>
</svg>
